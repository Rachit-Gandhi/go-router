name: ci

on:
  push:
    branches: ["feat/authCrud", "feat/auth-crud-revoke-delete"]
  pull_request:
    branches: ["feat/authCrud"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Go test
        run: go test ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60.1
          args: --timeout=5m
